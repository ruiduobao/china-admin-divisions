name: china-admin-divisions
display_name: 中国行政区划下载
description: |
  通过 map.ruiduobao.com 的免费 API 下载中国五级行政区划（省/市/县/乡/村）
  矢量数据。支持 GeoJSON / Shapefile / KML / GeoPackage / SVG 多种格式。
  支持名称搜索、树状下钻、单区划下载、批量下辖下载、bbox 与面积计算（含
  1 km 扩展缓冲）。无需任何凭据。
version: 0.1.0
author: Mavis
entrypoint: scripts/china_admin_divisions.py
runtime: python>=3.9
tags:
  - gis
  - china
  - administrative-divisions
  - vector
  - shapefile
  - geojson
